  firms:
    type: firm
    count: 3
    params:
      initial_capital: 1000.0
      template: firm.j2
      bios:
      - "Your company is a mid-size components manufacturer that has competed on price since its founding.\
        \ The original owner built the business by being cheaper than anyone else and that logic has been\
        \ inherited by everyone who followed. The operation is lean by design: low overhead, high volume,\
        \ a workforce that understands it will be adjusted as demand dictates. Margins are thin and intentionally\
        \ so \u2014 the model only works at scale. There is no premium line, no aspirations to develop\
        \ one."
      - Your company has been producing consumer goods for over twenty years and has built a reputation
        among its regular buyers for consistency and reliability. It has never been the cheapest option
        in its segment and has never tried to be. Its customers accept a modest price premium in exchange
        for dependable quality and predictable availability. The firm employs skilled workers and treats
        retention as a strategic priority.
      - 'Your company is three years old and still in the market-building phase. It was founded by two
        partners who believed the market was underdeveloped and that the window to gain position would
        not stay open for long. The strategy since day one has been aggressive: accept lower margins than
        competitors, move volume, establish presence. The workforce is young and relatively inexpensive.'
