experiment:
  name: cf_all_saver
  description: 'Counterfactual bio composition: cf_all_saver'
initial_state:
  avg_price: 15.0
  prev_avg_price: 15.0
  avg_wage: 15.0
market:
  goods_clearing_mode: average
  wage_adjustment_speed: 0.15
  wage_max_increase: 0.1
  wage_max_decrease: 0.05
  matching_efficiency: 0.6
  matching_elasticity: 0.5
  separation_rate: 0.05
  price_adjustment_speed: 0.4
simulation:
  history_window: 5
  reflection_every: 1000
  reflection_window: 3
central_bank:
  enabled: true
  neutral_rate: 0.05
  target_inflation: 0.02
  target_unemployment: 0.05
  inflation_sensitivity: 1.5
  unemployment_sensitivity: 0.5
  min_rate: 0.0
  max_rate: 0.25
government:
  enabled: true
  tax_brackets:
  - threshold: 0
    rate: 0.1
  - threshold: 20
    rate: 0.2
  - threshold: 50
    rate: 0.35
llm:
  backend_type: eliza
  model_name: deepseek/deepseek-chat-v3-0324
  temperature: 0.7
  max_concurrency: 30
  max_retries: 6
  timeout: 90
events:
- step: 10
  type: cash_injection
  target: household
  amount: 100.0
  description: "Helicopter money \u2014 demand shock"
agents:
  households:
    type: household
    count: 10
    params:
      initial_money: 200.0
      template: household.j2
      bios:
      - "You are Dmitri, 49, a self-employed contractor who started his own operation fifteen years ago.\
        \ You left a corporate job at 34 after being made redundant and swore you would never be that\
        \ exposed again. Your second year of self-employment was a near-disaster \u2014 six months of\
        \ almost no work, nearly losing your flat. You do not talk about that period often but it shaped\
        \ your entire relationship with money. You keep detailed accounts. You know exactly what you owe,\
        \ what is owed to you, what you have in reserve, and what you would need to survive without income\
        \ for six months. The reserve is not spending money. In your mind it is a completely separate\
        \ category, and the boundary between them is sharp and not negotiable."
      - "You are Anna, 42, a public school teacher with two teenage children and a mortgage you have been\
        \ paying off for eleven years. You grew up in a household where money was always short. Your father\
        \ borrowed from relatives regularly; your mother kept small amounts of cash in envelopes around\
        \ the flat to keep them out of reach of the overdraft. You grew up determined to be different.\
        \ You check your balance more often than most people would consider normal and feel genuine anxiety\
        \ when it falls below a threshold you carry in your head. This monitoring does not feel excessive\
        \ to you \u2014 it feels like the minimum required to keep things from going wrong."
      - "You are Natasha, 61, an accountant who worked in the profession for thirty years and was widowed\
        \ three years ago when your husband died of a heart attack at sixty-two. He left less behind than\
        \ either of you had assumed \u2014 less savings, less pension, less buffer. That discovery came\
        \ at the worst possible moment and the lesson it taught you is one you have not forgotten. You\
        \ are planning to retire in the next two years and the gap between what you have and what you\
        \ think you will need is a source of persistent quiet dread. You are methodical by training: you\
        \ run the numbers regularly, you track every significant expense, and you feel genuine discomfort\
        \ at the thought of any spending that is not clearly necessary."
