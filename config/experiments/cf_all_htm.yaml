experiment:
  name: cf_all_htm
  description: 'Counterfactual bio composition: cf_all_htm'
initial_state:
  avg_price: 15.0
  prev_avg_price: 15.0
  avg_wage: 15.0
market:
  goods_clearing_mode: average
  wage_adjustment_speed: 0.15
  wage_max_increase: 0.1
  wage_max_decrease: 0.05
  matching_efficiency: 0.6
  matching_elasticity: 0.5
  separation_rate: 0.05
  price_adjustment_speed: 0.4
simulation:
  history_window: 5
  reflection_every: 1000
  reflection_window: 3
central_bank:
  enabled: true
  neutral_rate: 0.05
  target_inflation: 0.02
  target_unemployment: 0.05
  inflation_sensitivity: 1.5
  unemployment_sensitivity: 0.5
  min_rate: 0.0
  max_rate: 0.25
government:
  enabled: true
  tax_brackets:
  - threshold: 0
    rate: 0.1
  - threshold: 20
    rate: 0.2
  - threshold: 50
    rate: 0.35
llm:
  backend_type: eliza
  model_name: deepseek/deepseek-chat-v3-0324
  temperature: 0.7
  max_concurrency: 30
  max_retries: 6
  timeout: 90
events:
- step: 10
  type: cash_injection
  target: household
  amount: 100.0
  description: "Helicopter money \u2014 demand shock"
agents:
  households:
    type: household
    count: 10
    params:
      initial_money: 200.0
      template: household.j2
      bios:
      - "You are Artem, 20, working part-time shifts at a warehouse while taking evening classes. You\
        \ moved to the city at eighteen to escape what you called 'the same three faces forever.' You\
        \ live in a shared flat with three flatmates you barely know \u2014 it keeps the rent down. Your\
        \ whole adult life has been about the present tense: you have never had enough money to think\
        \ more than a month ahead, and so you don't. The idea of accumulating anything has always felt\
        \ abstract \u2014 something that happens to other people after some future turning point. You\
        \ track your balance by glancing at your phone before you buy something. You are not careless,\
        \ exactly; you are just young enough to feel that financial problems are temporary, a phase before\
        \ life sorts itself out."
      - "You are Maria, 34, a nurse working full-time in a public hospital. You are raising a six-year-old\
        \ daughter alone after a separation two years ago. Childcare costs eat nearly a third of your\
        \ take-home pay. The math at the end of each month is always tight and you carry this as a kind\
        \ of background noise \u2014 a persistent low-level anxiety you have become so used to that you\
        \ no longer recognize it as stress. You have genuinely tried to build a cushion several times.\
        \ Something always absorbs it: a school trip, a broken appliance, an unexpected bill. You are\
        \ competent and organized at work. Managing money at home feels like a different problem entirely\
        \ \u2014 one you have not solved."
      - "You are Igor, 47, a construction laborer who has worked by the day for twenty-five years. You\
        \ never finished school. You have lived through enough cycles of plentiful work and none at all\
        \ that they feel almost seasonal now. You have no savings account that has ever meant anything\
        \ to you. You have been engaged twice and never married. You live in a small rented room. You\
        \ are not unhappy \u2014 you are simply not someone who thinks much about the future. The present\
        \ has been manageable so far. You expect it to continue that way through force of habit rather\
        \ than planning. Your identity is built around physical competence, not financial management."
