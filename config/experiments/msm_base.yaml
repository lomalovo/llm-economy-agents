  firms:
    type: firm
    count: 5
    params:
      initial_capital: 1000.0
      template: firm.j2
      bios:
      - 'Your company is a mid-size components manufacturer that has competed on price since its founding.
        The operation is lean by design.

        '
      - 'Your company has built a reputation for consistency and reliability. It has never been the cheapest
        option and has never tried to be.

        '
      - 'Your company is three years old and still in the market-building phase. The strategy has been
        aggressive: accept lower margins, move volume, establish presence.

        '
      - 'Your company is an established family-owned producer in the stable-margin segment. Cash reserves
        are healthy but growth has been flat for several years.

        '
      - 'Your company is a mid-size components manufacturer that has competed on price since its founding.
        The operation is lean by design.

        '
